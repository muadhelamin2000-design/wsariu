name: wasariu
description: "وَسَارِعُوا - تطبيق إدارة الحياة اليومية"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^17.2.2
  fl_chart: ^1.2.0
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  uuid: ^4.4.0
  flutter_local_notifications: ^21.0.0
  flutter_timezone: ^5.0.2
  timezone: ^0.11.0
  adhan: ^2.0.0
  image_picker: ^1.1.2
  path_provider: ^2.1.3
  url_launcher: ^6.3.0
  hijri: ^3.0.0
  file_picker: ^11.0.2
  flutter_pdfview: ^1.3.2
  video_player: ^2.8.1
  chewie: ^1.7.5
  permission_handler: ^12.0.1
  home_widget: ^0.9.1
  just_audio: ^0.10.5
  audio_service: ^0.18.17
  get_it: ^9.2.1
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  encrypt: ^5.0.3 
  local_auth: ^3.0.1
  webview_flutter: ^4.10.0 
  flutter_secure_storage: ^10.3.0 
  dio: ^5.7.0 
  youtube_explode_dart: ^3.1.0 
  just_audio_background: ^0.0.1-beta.13 
  usage_stats: ^1.3.1 
  google_generative_ai: ^0.4.5 # إضافة محرك Gemini AI

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.14.2
  flutter_native_splash: ^2.4.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#070B14" 
  fullscreen: true

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icon.png
    - assets/videos/splash_video.mp4
    - assets/json/metadata.json
    - assets/json/surah/

  fonts:
    - family: uthman
      fonts:
        - asset: assets/fonts/uthman.ttf
    - family: surah-name-v1
      fonts:
        - asset: assets/fonts/surah-name-v1.ttf
    - family: surah-name-v2
      fonts:
        - asset: assets/fonts/surah-name-v2.ttf
    - family: surah-header
      fonts:
        - asset: assets/fonts/surah-header.ttf
    - family: juz-name
      fonts:
        - asset: assets/fonts/juz-name.ttf
